name: Python application

on: [push, pull_request]

jobs:
  lint:
    name: Lint & offline tests
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # hatch-vcs needs the full history (or at least the tags) to
        # derive the package version from the latest git tag.
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        pip install -e .

    - name: Ruff check
      run: ruff check .

    - name: Ruff format check
      run: ruff format --check .

    - name: Mypy
      run: mypy src/antenati antenati_gui.py

    - name: Pytest (offline only)
      run: pytest -m "not integration"

  test:
    name: Live download
    needs: lint

    strategy:
      matrix:
        runs-on: ['ubuntu-24.04']

    runs-on: ${{ matrix.runs-on }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.10
      uses: actions/setup-python@v6
      with:
        python-version: 3.10.19

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .

    - name: Download test
      run: |
        antenati "https://antenati.cultura.gov.it/ark:/12657/an_ua19944535/w9DWR8x"
