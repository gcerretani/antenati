name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  pyinstaller:
    name: PyInstaller (${{ matrix.runs-on }})
    strategy:
      fail-fast: false
      matrix:
        runs-on: ['ubuntu-22.04', 'macos-14', 'macos-13', 'windows-2022']
    runs-on: ${{ matrix.runs-on }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # hatch-vcs derives the version from git tags.
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install package + PyInstaller
      run: |
        python -m pip install --upgrade pip
        pip install .
        pip install pyinstaller

    - name: Build standalone GUI binary
      run: pyinstaller --windowed --onefile --name antenati_gui src/antenati/gui/__main__.py

    - name: Upload artifact for Windows
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: antenati_gui_windows.exe
        path: dist/antenati_gui.exe

    - name: Upload artifact for macOS and Ubuntu
      if: runner.os != 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: antenati_gui_${{ matrix.runs-on }}
        path: dist/antenati_gui

  build-distribution:
    name: Build sdist + wheel
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install build front-end
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build sdist and wheel
      run: python -m build

    - name: Report version
      id: version
      run: |
        version=$(ls dist/*.whl | head -1 | sed -E 's@.*/antenati-(.+)-py3.*@\1@')
        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "Built antenati $version"

    - name: Upload distribution artifact
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/*

  publish-pypi:
    name: Publish to PyPI
    # Only fire when the workflow was triggered by a v* tag; manual
    # workflow_dispatch builds binaries but doesn't republish to PyPI.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-distribution]
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/project/antenati/${{ needs.build-distribution.outputs.version }}
    permissions:
      # OIDC token used by trusted publishing — no PyPI API token needed.
      id-token: write
    steps:
    - name: Download distribution artifact
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
