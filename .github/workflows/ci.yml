name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-24.04
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        # hatch-vcs derives the version from git tags; needed even for
        # editable installs so `import antenati; antenati.__version__`
        # doesn't fall back to `0.0.0+local` during type-checking.
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'

    - name: Install package + dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Ruff check
      run: ruff check .

    - name: Ruff format check
      run: ruff format --check .

    - name: Mypy
      run: mypy src/antenati

  test:
    name: Offline tests (${{ matrix.python-version }} / ${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04', 'macos-14', 'windows-2022']
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install package + dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run offline test suite
      run: pytest -m "not integration"

    - name: Smoke `antenati --help`
      run: antenati --help

    - name: Smoke `python -m antenati --version`
      run: python -m antenati --version
